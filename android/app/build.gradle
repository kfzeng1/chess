plugins {
    id "com.android.application"
}

android {
    namespace "com.kfzeng.xiangqi"
    compileSdk 36

    defaultConfig {
        applicationId "com.kfzeng.xiangqi"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}
